# Govulncheck for push and pull_request, fails the steps if vulnerabilities are found

name: Govulncheck

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    name: Vulnerability Scan
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    # Pinned to v1.3.0 instead of golang/govulncheck-action@v1 (which always
    # installs @latest). v1.4.0 bundles x/tools v0.46.0, which panics while
    # building the call graph over generics ("ForEachElement called on type
    # containing *types.TypeParam" — golang/go#80055, a release-blocker
    # regression introduced after x/tools v0.44.0). Restore the action / drop
    # the pin once #80055 is fixed and released.
    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
    - name: Run govulncheck
      run: govulncheck ./...
