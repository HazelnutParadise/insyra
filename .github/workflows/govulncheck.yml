# Govulncheck for push and pull_request, fails the steps if vulnerabilities are found

name: Govulncheck

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  vulnerability-scan:
    runs-on: ubuntu-latest
    name: Vulnerability Scan
    steps:
    - uses: golang/govulncheck-action@v1
      with:
        # Pin to the module's Go version (matches every other workflow). The
        # action otherwise defaults to the latest stable Go, and govulncheck
        # under Go 1.26 panics analyzing generics ("ForEachElement called on
        # type containing *types.TypeParam").
        go-version-file: go.mod
        check-latest: false
        go-package: ./...
