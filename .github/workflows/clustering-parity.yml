name: Clustering Parity

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  clustering-parity:
    name: Slow clustering parity gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INSYRA_RUN_SLOW_PARITY: "1"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Set up R
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: "release"
    - name: Install Go dependencies
      run: go mod download
    - name: Install Python baseline dependencies
      run: python -m pip install --upgrade pip numpy scipy statsmodels
    - name: Install R baseline dependencies
      run: Rscript -e "install.packages(c('jsonlite','cluster','dbscan'), repos='https://cloud.r-project.org')"
    - name: Run clustering parity suite
      run: go test -count=1 -timeout 25m ./stats -run "TestCrossLangClustering(Methods|GeneratedCorpus)"
